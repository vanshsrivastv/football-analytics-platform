services:
  postgres:
    image: postgres:16-alpine
    container_name: football-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football_dev_password
      POSTGRES_DB: football_analytics
    ports:
      - "5432:5432"
    volumes:
      - football_pgdata:/var/lib/postgresql/data

volumes:
  football_pgdata: